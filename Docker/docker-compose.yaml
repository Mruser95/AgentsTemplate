services:
  agent-api:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "true"
    image: agents-template:latest
    container_name: agents-template
    restart: unless-stopped
    ports:
      - "8973:8000"
    env_file:
      - ../.env
    environment:
      RAG_DSN: postgresql://postgres:postgres@postgres:5432/rag
      MILVUS_URI: http://milvus:19530
    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ../SessionDB:/app/SessionDB
      - ../Logs:/app/Logs
      - ../Memory:/app/Memory
      - ../Knowledge:/app/Knowledge
    depends_on:
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  webui:
    image: nginx:alpine
    container_name: agents-webui
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../WebUI:/usr/share/nginx/html:ro
    depends_on:
      - agent-api

  postgres:
    image: pgvector/pgvector:pg16
    container_name: agents-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: agents-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: agents-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s

  milvus:
    image: milvusdb/milvus:v2.4.10
    container_name: agents-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s

volumes:
  pg_data:
  etcd_data:
  minio_data:
  milvus_data:
