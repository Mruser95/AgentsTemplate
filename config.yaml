# config.yaml

# >> Shell Tool Configuration
shell_restriction: false
shell_permissions:
  dir_options: [ls, cd, pwd, find, stat, file, du, df]
  txt_options: [cat, head, tail, less, more, echo, grep, awk, cut, tr, sort, uniq, wc, diff]
  env_options: [env, printenv, which, whereis, type, uname, hostname, date, whoami, id, uptime, ps]
  other_options: []
  
shell_count_limit: 20
shell_default_timeout: 90        # 默认 subprocess 超时（秒）；旧值 30s 会让联网/编译类命令被错杀
shell_max_timeout: 300            # agent 通过 timeout 入参可申请的上限（秒）
shell_output_max_length: 3000     # 命令输出超过该字符数做头尾截断（各留一半，保留尾部 traceback）；<=0 关闭截断
terminal_small_max_tokens: 1024   # 命令审查 / 输出摘要 small_llm 的 max_tokens；输出只需短 JSON


# >> Edit Tool Configuration
edit_count_limit: 20              # 单个 thread 内 edit 工具的最大调用次数


# >> Read Tool Configuration
read_count_limit: 20              # read_file 单 thread 调用上限
read_default_limit: 1000          # 默认从 offset 起最多读的行数（cat -n 格式）
read_output_max_chars: 12000      # 单页渲染字符上限（token 预算的字符代理）：默认读超出→只返首页+PARTIAL；显式 offset/limit 超出→直接报错。旧值 20000≈5K token，被重放 N 次很贵；12000≈3K token 仍能一页装下评测里多数单文件，更大文件交给 offset/limit 翻页


# >> Overview Tools (repo_map / grep / glob) Configuration
repo_map_count_limit: 20          # repo_map 单 thread 调用上限
repo_map_top_n: 12                # 默认按 PageRank 展开签名的文件数（旧值 20；展开文件越多输出越大，被重放越贵——12 个核心文件足够摸清结构）
repo_map_max_symbols: 18          # 单文件最多列出的类/函数签名数（旧值 25）
repo_map_max_listed: 50           # 非 top 文件最多逐行列名数（其余汇总成一行）；防大仓库输出爆炸（旧值 80）
repo_map_max_chars: 24000         # 整体输出硬上限（≈6K token）：超出从尾部（低相关文件）截断并加提示——兜底防 190K 字符级 repo_map 灌进历史被反复重放

grep_count_limit: 30              # grep 单 thread 调用上限
grep_max_results: 40              # 默认返回最大命中行数（旧值 80；40 条命中已够定位，更省被重放的历史）
grep_max_per_file: 6              # 单文件最多返回命中行数（旧值 10）

glob_count_limit: 30              # glob 单 thread 调用上限
glob_max_results: 200             # 默认返回最大文件数


# >> Browser Tool Configuration 
browser_count_limit: 15
browser_headless: true
browser_timeout: 30000          # milliseconds
browser_allowed_domains: []     # empty = allow all; e.g. ["github.com", "google.com"]


# >> Tavily Search Tool Configuration
tavily_count_limit: 10
tavily_max_results: 3
tavily_search_depth: basic       # "basic" or "advanced"；优先速度，减少深搜耗时
tavily_include_answer: true      # let Tavily synthesize a short answer
tavily_include_domains: []       # empty = no allow-list filter
tavily_exclude_domains: []       # empty = no exclude filter


# >> LLM Runtime（每个 agent 独立可调：超时 / 重试 / 思考开关）
# timeout：请求级总超时（秒），stall 时快速失败而非干等；流式 agent 的逐块超时与之对齐
# max_retries：超时 / 瞬时错误的自动重试次数
# reasoning：是否开启模型思考，false=关闭（deepseek-v4-pro 实测 ~3.4x 提速 / ~3.5x 降本）
coder_timeout: 120
coder_max_retries: 2
coder_reasoning: false
tester_timeout: 120              # tester 与 test runner 共用底层 llm，这三项对两者同时生效
tester_max_retries: 2
tester_reasoning: false
tasker_timeout: 120
tasker_max_retries: 2
tasker_reasoning: false
retriever_timeout: 120
retriever_max_retries: 2
retriever_reasoning: false
manager_timeout: 180
manager_max_retries: 2
manager_reasoning: false
checker_timeout: 120
checker_max_retries: 2
checker_reasoning: false


# >> Debug Toggles（调试开关：默认 false=生产/干净行为；改 true 仅用于排查，改后需重启进程生效）
subagent_persist_checkpoint: false   # true=子代理(coder/tasker/tester/retriever/checker)继承 manager 的 saver，把全量 state 写进 SessionDB/checkpoints.db（嵌套命名空间、写放大）——想回看子代理轨迹时才开
subagent_stream_output: false        # true=把子代理内部的 token / 工具事件也流式推给前端（与 manager 自身输出交错、较嘈杂）；false=只流式 manager 自身


# >> Tasker Coder Agent Configuration
tasker_run_call_limit: 10        # 旧值 40 太松；tasker 只负责拆分+派发+汇总，不该自己多轮
tasker_exit_behavior: end
tasker_max_tokens: 8192           # 汇总多个子任务的 TaskerReport（file_changes/main_modules 合集）可能很长，4096 易被截断触发 LengthFinishReasonError
dispatch_count_limit: 5          # 单个综合任务最多派 5 个子任务（旧值 6）；每个子任务又是一整轮 coder 循环，控总量防乘法爆炸


# >> Coder Agent Configuration
coder_run_call_limit: 25         # max LLM calls per single coder.invoke run（旧值 50 太松；单文件改动正常 5-12 轮够，留余量给 lint 重试）
coder_subtask_run_limit: 25      # 子代理（dispatch_coder 派发的一次性子任务）的强制 step 上限：超过后中间件会优雅退出，coder 必须直接产出 CoderReport 总结（旧值 24，下调防嵌套乘法爆炸）
coder_exit_behavior: end         # "end" -> graceful stop; "error" -> raise
coder_lint_max_retries: 2        # max "lint fail -> feedback -> re-invoke" rounds (0 disables retry, status forced BLOCKED on first fail)
coder_max_tokens: 8192          # 最大单次输出 token：要容纳整段代码 + CoderReport JSON；不够会触发截断


# >> Tester Agent Configuration
tester_run_call_limit: 15        # max LLM calls per single tester.invoke run
tester_exit_behavior: end        # "end" -> graceful stop; "error" -> raise
tester_max_tokens: 4096          # 输出 TestDataset JSON；用例数量大可按需调高

# >> Test Runner Agent Configuration（执行 TestDatasets.json 并产 TestReport）
runner_run_call_limit: 25        # 跑用例需要更多 terminal 轮次
runner_exit_behavior: end
runner_max_tokens: 8192          # 输出 TestReport JSON；4096 对 20+ 条 results 会撞顶截断→重试空烧输出（输出 $15/M 最贵），提到 8192 留头寸；配合 TestCaseResult.evidence/actual_output 的 ≤500 字符上限控总量


# >> Checker Agent Configuration
checker_run_call_limit: 10       # max LLM calls per single checker.invoke run
checker_exit_behavior: end       # "end" -> graceful stop; "error" -> raise
checker_max_tokens: 2048         # CheckerReport 本身短，2K 足够


# >> Manager Agent Configuration
manager_run_call_limit: 80       # max LLM calls per single manager.invoke run（executing 阶段循环派发 + 自救重派很吃预算；旧值 30 常导致"做完一块就停下报告用户"。配 _ManagerBudgetReminder 临近上限才收尾）
manager_exit_behavior: end       # "end" -> graceful stop; "error" -> raise
manager_recursion_limit: 2000     # 限制单次运行循环步数；须 > run_limit*2（每次 LLM 调用≈model+tools 两步），否则会在 run_limit 优雅退出前先抛 GraphRecursionError 硬崩
manager_max_tokens: 4096         # 单条回复要能容纳「一波多份自包含 task_prompt 的并行 dispatch」；2048 易被截断→模型退回逐个串行。仍是上限非目标，普通短回复不受影响（受 prompt 的 ≤200 字约束）


# >> Build Agent CLI Configuration
build_agent_max_retries: 5       # build_agent.py：manager 提前停止（未输出 BUILD_RESULT）时自动续跑的最大次数


# >> Collation Scheduler Configuration
collation_turn_threshold: 16        # notify 累计满 N 轮即触发一次整理（不再 *2）：short_mem 自读 checkpoint，对所有未摘要消息压缩较旧一半（新一半留待下轮自然变"较旧"再压）；long_mem / skill 用 cursor=len(post_msgs) 做增量去重，按整段新增处理
collation_max_parallel: 2           # 同时在跑的 collation 任务上限（跨 thread 共享信号量）
collation_retry_count: 1            # 单个 route 失败时的重试次数（总尝试数 = retry_count + 1）
collation_long_memory_k: 5          # 长期记忆整理时每条候选召回的最近邻数


# >> MCP Configuration
mcp_server:
  host: 127.0.0.1
  port: 8000
  timeout: 30000    # milliseconds
  sse_read_timeout: 30000
extensions:
  - name: terminal
    url: http://localhost:8000/mcp
  - name: browser
    url: http://localhost:8001/mcp


# >> Knowledge Retriever Configuration
dim: 1024
dsn: postgresql://postgres:postgres@localhost:5432/rag
embed_model: BAAI/bge-m3
rerank_model: BAAI/bge-reranker-v2-m3
retrieve_top_k: 5                # default Top-K returned by knowledge_search
retrieve_call_limit: 20          # max knowledge_search calls per session
retriever_run_call_limit: 6      # 单次 retrieve 内部 LLM 循环上限（核心防烧钱旋钮）：超过即优雅收尾产出 RetrievalReport，避免 tavily/browser 反复空转
retriever_exit_behavior: end     # "end" -> 超限优雅停并产出结构化报告；"error" -> 直接抛错
retriever_recursion_limit: 18    # max LangGraph steps per single retrieve run（硬兜底，旧值 80≈40 次 LLM 太松）
retriever_max_tokens: 4096       # retriever 产 RetrievalReport，长 summary 够用

vec_k: 30
bm25_k: 30
rrf_c: 60

